services:
  hannamedma-server:
    build:
      context: ./hanna-med-ma-server
      dockerfile: Dockerfile
    restart: unless-stopped
    environment:
      - SERVER_NODE_ENV=${SERVER_NODE_ENV:-production}
      - SERVER_PORT=${SERVER_PORT:-3002}
      - SERVER_DATABASE_URL=${SERVER_DATABASE_URL}
      - SERVER_JWT_SECRET=${SERVER_JWT_SECRET}
      - SERVER_CREDENTIALS_ENCRYPTION_KEY=${SERVER_CREDENTIALS_ENCRYPTION_KEY}
      - SERVER_API_KEY=${SERVER_API_KEY}
      - SERVER_FIREBASE_PROJECT_ID=${SERVER_FIREBASE_PROJECT_ID}
      - SERVER_FIREBASE_CLIENT_EMAIL=${SERVER_FIREBASE_CLIENT_EMAIL}
      - SERVER_FIREBASE_PRIVATE_KEY=${SERVER_FIREBASE_PRIVATE_KEY}
      - SERVER_GEMINI_API_KEY=${SERVER_GEMINI_API_KEY}
      - SERVER_REDIS_URL=${SERVER_REDIS_URL}
    expose:
      - ${SERVER_PORT:-3002}
    networks:
      - dokploy-network

  hannamedma-client:
    build:
      context: ./hanna-med-ma-client
      dockerfile: Dockerfile
      args:
        - VITE_API_URL=${VITE_API_URL}
        - VITE_FIREBASE_API_KEY=${VITE_FIREBASE_API_KEY}
        - VITE_FIREBASE_AUTH_DOMAIN=${VITE_FIREBASE_AUTH_DOMAIN}
        - VITE_FIREBASE_PROJECT_ID=${VITE_FIREBASE_PROJECT_ID}
        - VITE_FIREBASE_STORAGE_BUCKET=${VITE_FIREBASE_STORAGE_BUCKET}
        - VITE_FIREBASE_MESSAGING_SENDER_ID=${VITE_FIREBASE_MESSAGING_SENDER_ID}
        - VITE_FIREBASE_APP_ID=${VITE_FIREBASE_APP_ID}
    restart: unless-stopped
    expose:
      - ${CLIENT_PORT:-3003}
    networks:
      - dokploy-network

networks:
  dokploy-network:
    external: true
